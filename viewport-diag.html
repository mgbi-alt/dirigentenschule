<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewport-Diagnose</title>
<style>
:root{
  --bg:#161311; --card:#211c18; --line:rgba(255,255,255,.12);
  --text:#f2ece2; --text2:#a89a86; --accent:#e8a020;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:ui-monospace,'SF Mono',Consolas,monospace;padding:16px}
h1{font-size:15px;font-weight:700;margin:0 0 14px;letter-spacing:.02em;color:var(--text2);text-transform:uppercase}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.row .k{font-size:12px;color:var(--text2)}
.row .v{font-size:20px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;text-align:right}
.ruler{margin-top:20px}
.ruler-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.ruler-track{position:relative;height:34px;background:var(--card);border:1px solid var(--line);border-radius:6px;overflow:visible}
.tick{position:absolute;top:0;bottom:0;border-left:1px solid var(--line)}
.tick span{position:absolute;top:2px;left:3px;font-size:9px;color:var(--text2)}
.tick.major{border-left:1px solid var(--accent)}
.tick.major span{color:var(--accent);font-weight:700}
.note{margin-top:18px;font-size:12px;color:var(--text2);line-height:1.6}
</style>
</head>
<body>

<h1>Viewport-Diagnose</h1>
<div id="rows"></div>

<div class="ruler">
  <div class="ruler-label">Lineal (Markierungen bei 320 / 360 / 375 / 390 / 412 / 430px) -- wo hoert die farbige Linie auf?</div>
  <div class="ruler-track" id="ruler"></div>
</div>

<p class="note">Bitte Zahlen oben + Screenshot vom Lineal schicken.</p>

<script>
function add(k,v){
  const r=document.getElementById('rows');
  const d=document.createElement('div'); d.className='row';
  d.innerHTML='<span class="k">'+k+'</span><span class="v">'+v+'</span>';
  r.appendChild(d);
}
add('window.innerWidth', window.innerWidth+'px');
add('window.innerHeight', window.innerHeight+'px');
add('document.documentElement.clientWidth', document.documentElement.clientWidth+'px');
add('screen.width / height', screen.width+' / '+screen.height);
add('devicePixelRatio', window.devicePixelRatio);
if(window.visualViewport){
  add('visualViewport.width', Math.round(window.visualViewport.width)+'px');
  add('visualViewport.scale', window.visualViewport.scale);
}else{
  add('visualViewport', 'nicht verfuegbar');
}

const marks=[320,360,375,390,412,430];
const track=document.getElementById('ruler');
const trackWidthPx = track.getBoundingClientRect().width || window.innerWidth;
marks.forEach(m=>{
  const t=document.createElement('div');
  t.className='tick major';
  t.style.left=m+'px';
  t.innerHTML='<span>'+m+'</span>';
  track.appendChild(t);
});
for(let m=0;m<=trackWidthPx+50;m+=10){
  if(marks.includes(m)) continue;
  const t=document.createElement('div');
  t.className='tick';
  t.style.left=m+'px';
  track.appendChild(t);
}
</script>
</body>
</html>
